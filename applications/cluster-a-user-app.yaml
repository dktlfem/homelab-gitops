apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cluster-a-user-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/dktlfem/homelab-gitops.git
    targetRevision: HEAD
    path: cluster-a/apps/user-app
  destination:
    server: https://10.10.10.30:6443
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true